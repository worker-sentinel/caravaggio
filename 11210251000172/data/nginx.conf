events { worker_connections 1024; }

http {
    upstream slims_cluster {
        server slims-app:80;
        server slims-app-2:80;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://slims_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
